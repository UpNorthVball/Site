<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>On‑Site Status Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- SheetJS (XLSX parser) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg: #f6f7f9;
      --card: rgba(255,255,255,.82);
      --card2: rgba(255,255,255,.72);
      --stroke: rgba(15,23,42,.08);
      --text: #0f172a;
      --muted: rgba(15,23,42,.62);
      --shadow: 0 10px 30px rgba(15,23,42,.08);
      --shadow2: 0 8px 20px rgba(15,23,42,.06);
      --radius: 18px;
      --radius2: 14px;
      --accent: #2563eb;
      --accent2: #7c3aed;
      --good: #16a34a;
      --warn: #f59e0b;
      --bad: #ef4444;
    }
    *{ box-sizing: border-box; }
    html,body{ height: 100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 600px at 20% 0%, rgba(37,99,235,.10), transparent 55%),
                  radial-gradient(900px 500px at 90% 10%, rgba(124,58,237,.10), transparent 60%),
                  var(--bg);
      color: var(--text);
    }
    .wrap{
      max-width: 1200px;
      margin: 28px auto 80px;
      padding: 0 18px;
    }
    header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap: 6px;
    }
    h1{
      margin:0;
      font-size: 28px;
      letter-spacing: -0.02em;
    }
    .sub{
      margin:0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    .controls{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content:flex-end;
    }
    .pill{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 999px;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(10px);
    }
    .pill label{
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    select, input[type="file"]{
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--stroke);
      padding: 8px 10px;
      background: rgba(255,255,255,.9);
      outline:none;
    }
    button{
      font: inherit;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      padding: 10px 12px;
      background: linear-gradient(135deg, rgba(37,99,235,.12), rgba(124,58,237,.10));
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow2);
      transition: transform .08s ease, filter .2s ease, background .2s ease;
    }
    button:hover{ filter: brightness(1.02); }
    button:active{ transform: translateY(1px); }

    .grid{
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0 22px;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px){
      .grid{ grid-template-columns: 1fr; }
      header{ align-items:flex-start; flex-direction:column; }
      .controls{ justify-content:flex-start; }
    }
    .kpi{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 14px 12px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow:hidden;
      min-height: 94px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .kpi:before{
      content:"";
      position:absolute;
      inset:-60px -80px auto auto;
      width:160px;height:160px;
      background: radial-gradient(circle at 30% 30%, rgba(37,99,235,.22), transparent 60%);
      transform: rotate(18deg);
    }
    .kpi .name{
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      position:relative;
      z-index: 1;
      text-align:center;
    }
    .kpi .value{
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.02em;
      position:relative;
      z-index: 1;
      text-align:center; /* centered value */
    }
    .kpi .meta{
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.4;
      color: var(--muted);
      position:relative;
      z-index: 1;
      text-align:center;
    }

    .section{
      margin-top: 18px;
      background: var(--card2);
      border: 1px solid var(--stroke);
      border-radius: calc(var(--radius) + 6px);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .section-head{
      padding: 16px 16px 0;
    }
    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .section-title h2{
      margin:0;
      font-size: 16px;
      letter-spacing:-0.01em;
    }
    .hint{
      font-size: 12px;
      color: var(--muted);
    }

    .tabs{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 16px 12px;
      border-bottom: 1px solid var(--stroke);
    }
    .tab{
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.75);
      cursor:pointer;
      font-weight: 600;
      font-size: 12px;
      color: rgba(15,23,42,.75);
      user-select:none;
      outline:none;
    }
    .tab[aria-selected="true"]{
      background: linear-gradient(135deg, rgba(37,99,235,.18), rgba(124,58,237,.15));
      border-color: rgba(37,99,235,.25);
      color: rgba(15,23,42,.92);
      box-shadow: 0 6px 14px rgba(37,99,235,.10);
    }

    .content{
      padding: 14px 16px 18px;
    }

    .split{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .view-tabs{ display:flex; gap: 8px; flex-wrap: wrap; }
    .mini{
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.72);
      cursor:pointer;
      font-weight: 600;
      color: rgba(15,23,42,.72);
    }
    .mini[aria-selected="true"]{
      background: rgba(255,255,255,.95);
      color: rgba(15,23,42,.92);
      box-shadow: 0 6px 14px rgba(15,23,42,.06);
    }

    .table{
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow:hidden;
      border-radius: var(--radius2);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.88);
    }
    .table th, .table td{
      padding: 10px 10px;
      text-align:left;
      border-bottom: 1px solid rgba(15,23,42,.06);
      font-size: 13px;
      white-space:nowrap;
    }
    .table th{
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(15,23,42,.55);
      background: rgba(15,23,42,.02);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .table tr:last-child td{ border-bottom: none; }
    .table-wrap{
      max-height: 340px;
      overflow:auto;
      border-radius: var(--radius2);
      box-shadow: 0 8px 18px rgba(15,23,42,.06);
    }

    .chart-card{
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.88);
      border-radius: var(--radius2);
      padding: 12px;
      box-shadow: 0 10px 20px rgba(15,23,42,.06);
    }
    .donut-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .donut-card-title{
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
      color: rgba(15,23,42,.72);
      margin-bottom: 8px;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      text-align: center;
      line-height: 1.35;
    }
    .donut-canvas-wrap{
      position: relative;
      height: 250px;
      margin-bottom: 10px;
    }
    .donut-legend{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      align-items: start;
    }
    .legend-item{
      display:flex;
      align-items:flex-start;
      gap:8px;
      min-width:0;
    }
    .legend-swatch{
      width:10px;
      height:10px;
      border-radius:3px;
      flex:0 0 10px;
      margin-top:4px;
    }
    .legend-text{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
      color: rgba(15,23,42,.80);
    }
    .legend-label{
      font-size:12px;
      font-weight:600;
      line-height:1.25;
      word-break:break-word;
    }
    .legend-value{
      font-size:11px;
      color: var(--muted);
      line-height:1.2;
    }

    .row{
      display:flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom: 10px;
    }
    .row .left{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
    }
    .badge{
      font-size: 12px;
      font-weight: 700;
      color: rgba(15,23,42,.74);
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(37,99,235,.10);
      border: 1px solid rgba(37,99,235,.18);
    }
    .empty{
      padding: 18px;
      border: 1px dashed rgba(15,23,42,.18);
      border-radius: var(--radius2);
      background: rgba(255,255,255,.70);
      color: var(--muted);
      font-size: 13px;
    }
    .muted{ color: var(--muted); }
    a{ color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>On‑Site Status</h1>
        <p class="sub">Author: Dane Erosa</p>
      </div>
      <div class="controls">
        <div class="pill">
          <label for="weekSelect">Week</label>
          <select id="weekSelect" aria-label="Week selector"></select>
        </div>
        <div class="pill">
          <label for="fileInput">Data</label>
          <input id="fileInput" type="file" accept=".xlsx" aria-label="Upload XLSX" />
        </div>
        <button id="downloadShareBtn" title="Download a shareable HTML copy with embedded data">Download Shareable Copy</button>
        <button id="resetBtn" title="Clear saved data and reload">Reset</button>
      </div>
    </header>

    <section class="grid" id="kpiGrid" aria-label="KPI cards"></section>

    <div id="sections"></div>
  </div>

<script>
(() => {
  const STORAGE_KEY = "onsiteDashboardData_v2";
  const STORAGE_META = "onsiteDashboardMeta_v2";

  const STATUS = [
    { key: "FullRemote", label: "Full Remote" },
    { key: "HybridRemote", label: "Hybrid Remote" },
    { key: "HybridOffice", label: "Hybrid Office" },
    { key: "InOffice", label: "In Office" },
    { key: "Tellecommuters", label: "Telecommuters" }, // column name as requested
  ];

  const STATUS_DEFINITIONS = {
    FullRemote: "Works remotely as their primary arrangement and is not routinely expected onsite.",
    HybridRemote: "Splits time between remote and onsite work, with remote work as the primary pattern.",
    HybridOffice: "Splits time between onsite and remote work, with onsite presence as the primary pattern.",
    InOffice: "Works primarily from a company site on a regular full-time basis.",
    Tellecommuters: "Has an approved telecommuting arrangement to work away from a company site."
  };

  const SERIES_COLORS = [
    "#1d4ed8", // deep blue
    "#3b82f6", // blue
    "#93c5fd", // light blue
    "#64748b", // slate grey
    "#cbd5e1"  // light grey
  ];

  const preferKeys = (row, keys, fallback="") => {
    for (const k of keys) {
      if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== "") return row[k];
    }
    return fallback;
  };

  // --------- Data helpers ----------
  const toISODate = (v) => {
    if (!v) return "";
    if (v instanceof Date && !isNaN(v)) {
      const yyyy = v.getFullYear();
      const mm = String(v.getMonth()+1).padStart(2,"0");
      const dd = String(v.getDate()).padStart(2,"0");
      return `${yyyy}-${mm}-${dd}`;
    }
    // Try parse string
    const d = new Date(v);
    if (!isNaN(d)) return toISODate(d);
    return String(v);
  };

  const normalizeRows = (rows) => rows.map(r => {
    const out = {};
    for (const [k,v] of Object.entries(r)) {
      const key = String(k).trim();
      out[key] = v;
    }
    // Normalize date fields
    out["WeekStartDate"] = toISODate(out["WeekStartDate"]);
    out["recent_hire_date"] = toISODate(out["recent_hire_date"]);
    // Ensure numeric 0/1
    out["StandardHeadCount"] = Number(out["StandardHeadCount"] ?? 0) || 0;
    for (const s of STATUS) {
      out[s.key] = Number(out[s.key] ?? 0) || 0;
    }
    return out;
  });

  const uniqueSortedWeeks = (rows) => {
    const set = new Set(rows.map(r => r.WeekStartDate).filter(Boolean));
    return Array.from(set).sort((a,b) => (a < b ? 1 : -1)); // desc
  };

  const sum = (arr) => arr.reduce((a,b)=>a+b,0);

  const computeTotals = (rows) => {
    const denom = sum(rows.map(r => r.StandardHeadCount));
    const totals = { denom };
    for (const s of STATUS) totals[s.key] = sum(rows.map(r => r[s.key]));
    return totals;
  };

  const pct = (num, denom) => denom ? (num / denom) : 0;

  const groupBy = (rows, key) => {
    const m = new Map();
    for (const r of rows) {
      const g = (r[key] ?? "—").toString().trim() || "—";
      if (!m.has(g)) m.set(g, { group: g, denom: 0, counts: Object.fromEntries(STATUS.map(s => [s.key, 0])) });
      const obj = m.get(g);
      obj.denom += Number(r.StandardHeadCount || 0);
      for (const s of STATUS) obj.counts[s.key] += Number(r[s.key] || 0);
    }
    const arr = Array.from(m.values());
    arr.sort((a,b)=> b.denom - a.denom || a.group.localeCompare(b.group));
    return arr;
  };

  const topNPlusOther = (arr, n=10) => {
    if (arr.length <= n) return arr;
    const top = arr.slice(0,n);
    const rest = arr.slice(n);
    const other = {
      group: "All Others Combined",
      denom: sum(rest.map(r=>r.denom)),
      counts: Object.fromEntries(STATUS.map(s => [s.key, sum(rest.map(r=>r.counts[s.key]))]))
    };
    return [...top, other];
  };

  // --------- UI rendering ----------
  const el = (tag, attrs={}, children=[]) => {
    const node = document.createElement(tag);
    for (const [k,v] of Object.entries(attrs)) {
      if (k === "class") node.className = v;
      else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "html") node.innerHTML = v;
      else if (v !== null && v !== undefined) node.setAttribute(k, v);
    }
    for (const c of children) node.append(c);
    return node;
  };

  const kpiGrid = document.getElementById("kpiGrid");
  const sectionsHost = document.getElementById("sections");
  const weekSelect = document.getElementById("weekSelect");
  const fileInput = document.getElementById("fileInput");
  const resetBtn = document.getElementById("resetBtn");
  const downloadShareBtn = document.getElementById("downloadShareBtn");

  const charts = new Map(); // canvasId -> Chart instance

  const formatPct = (v) => `${(v*100).toFixed(1)}%`;

  const renderKPIs = (rowsWeek) => {
    const totals = computeTotals(rowsWeek);
    kpiGrid.innerHTML = "";
    for (const s of STATUS) {
      const value = formatPct(pct(totals[s.key], totals.denom));
      const meta = STATUS_DEFINITIONS[s.key] || "";
      kpiGrid.append(
        el("div", { class:"kpi", role:"group", "aria-label": s.label }, [
          el("div", { class:"name" }, [document.createTextNode(s.label)]),
          el("div", { class:"value" }, [document.createTextNode(value)]),
          el("div", { class:"meta" }, [document.createTextNode(meta)]),
        ])
      );
    }
  };

  const destroyChart = (canvasId) => {
    const ch = charts.get(canvasId);
    if (ch) { ch.destroy(); charts.delete(canvasId); }
  };

  const renderTable = (tableHost, grouped) => {
    grouped = topNPlusOther(grouped, 10);
    const table = el("table", { class:"table" });
    const thead = el("thead");
    const trh = el("tr");
    trh.append(el("th", {}, [document.createTextNode("Group")]));
    trh.append(el("th", {}, [document.createTextNode("Headcount")]));
    for (const s of STATUS) trh.append(el("th", {}, [document.createTextNode(s.label + " %")]));
    thead.append(trh);

    const tbody = el("tbody");
    for (const g of grouped) {
      const tr = el("tr");
      tr.append(el("td", {}, [document.createTextNode(g.group)]));
      tr.append(el("td", {}, [document.createTextNode(g.denom.toLocaleString())]));
      for (const s of STATUS) {
        tr.append(el("td", {}, [document.createTextNode(formatPct(pct(g.counts[s.key], g.denom))) ]));
      }
      tbody.append(tr);
    }
    table.append(thead, tbody);
    tableHost.innerHTML = "";
    tableHost.append(table);
  };

  const getContrastTextColor = (color) => {
    const hex = String(color || "").trim();
    const match = hex.match(/^#([0-9a-f]{6})$/i);
    if (!match) return "rgba(15,23,42,0.9)";
    const value = match[1];
    const r = parseInt(value.slice(0,2), 16);
    const g = parseInt(value.slice(2,4), 16);
    const b = parseInt(value.slice(4,6), 16);
    const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return luminance > 0.68 ? "rgba(15,23,42,0.9)" : "rgba(255,255,255,0.96)";
  };

  const stackedBarPercentPlugin = {
    id: "stackedBarPercentPlugin",
    afterDatasetsDraw(chart) {
      if (chart.config.type !== "bar") return;
      const { ctx } = chart;
      ctx.save();
      ctx.font = "600 11px Inter, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      chart.data.datasets.forEach((dataset, datasetIndex) => {
        const meta = chart.getDatasetMeta(datasetIndex);
        if (!meta || meta.hidden) return;

        meta.data.forEach((bar, index) => {
          const raw = Number(dataset.data?.[index]) || 0;
          if (raw <= 0) return;

          const props = bar.getProps(["x", "y", "base"], true);
          const segmentHeight = Math.abs(props.base - props.y);
          if (segmentHeight < 18) return;

          const label = `${raw.toFixed(1)}%`;
          const bg = Array.isArray(dataset.backgroundColor)
            ? (dataset.backgroundColor[index] || SERIES_COLORS[datasetIndex % SERIES_COLORS.length])
            : (dataset.backgroundColor || SERIES_COLORS[datasetIndex % SERIES_COLORS.length]);

          ctx.fillStyle = getContrastTextColor(bg);
          ctx.fillText(label, props.x, props.y + ((props.base - props.y) / 2));
        });
      });

      ctx.restore();
    }
  };

  const renderStackedBar = (canvas, grouped) => {
    const ctx = canvas.getContext("2d");
    const data = topNPlusOther(grouped, 10);
    const labels = data.map(d => d.group);
    const datasets = STATUS.map((s, i) => ({
      label: s.label,
      data: data.map(d => Math.round(pct(d.counts[s.key], d.denom) * 1000) / 10), // percentage to 0.1
      backgroundColor: SERIES_COLORS[i % SERIES_COLORS.length],
      hoverBackgroundColor: SERIES_COLORS[i % SERIES_COLORS.length],
      borderWidth: 0
    }));

    return new Chart(ctx, {
      type: "bar",
      data: { labels, datasets },
      plugins: [stackedBarPercentPlugin],
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%` } }
        },
        scales: {
          x: {
            stacked: true,
            grid: { display: false, drawBorder: false },
            border: { display: false }
          },
          y: {
            stacked: true,
            suggestedMin: 0,
            suggestedMax: 100,
            grid: { display: false, drawBorder: false },
            border: { display: false },
            ticks: { callback: (v) => v + "%" }
          }
        }
      }
    });
  };

  const renderDonut = (canvas, g) => {
    const ctx = canvas.getContext("2d");
    const data = STATUS.map(s => Math.round(pct(g.counts[s.key], g.denom) * 1000) / 10);
    return new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: STATUS.map(s=>s.label),
        datasets: [{
          data,
          backgroundColor: SERIES_COLORS,
          hoverBackgroundColor: SERIES_COLORS,
          borderWidth: 0,
          offset: 2,
          spacing: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 8, right: 8, bottom: 8, left: 8 } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed.toFixed(1)}%` } }
        },
        cutout: "62%"
      }
    });
  };

  const renderStatusLegend = (host, options = {}) => {
    const { values = null } = options;
    host.innerHTML = "";
    STATUS.forEach((s, i) => {
      const itemChildren = [
        el("span", { class:"legend-swatch", style:`background:${SERIES_COLORS[i % SERIES_COLORS.length]}` }),
        el("div", { class:"legend-text" }, [
          el("span", { class:"legend-label" }, [document.createTextNode(s.label)]),
          ...(values && values[s.key] !== undefined
            ? [el("span", { class:"legend-value" }, [document.createTextNode(`${Number(values[s.key]).toFixed(1)}%`)])]
            : [])
        ])
      ];
      const item = el("div", { class:"legend-item" }, itemChildren);
      host.append(item);
    });
  };

  const renderDonutLegend = (host, g) => {
    const values = Object.fromEntries(STATUS.map((s) => [
      s.key,
      Math.round(pct(g.counts[s.key], g.denom) * 1000) / 10
    ]));
    renderStatusLegend(host, { values });
  };

  const makeSection = (cfg) => {
    const sectionId = cfg.id;

    const dimTabs = el("div", { class:"tabs", role:"tablist", "aria-label": cfg.title + " dimensions" });
    const content = el("div", { class:"content" });

    const section = el("section", { class:"section", id: sectionId }, [
      el("div", { class:"section-head" }, [
        el("div", { class:"section-title" }, [
          el("h2", {}, [document.createTextNode(cfg.title)]),

        ])
      ]),
      dimTabs,
      content
    ]);

    // Build dimension tabs
    cfg.dimensions.forEach((dim, i) => {
      const btn = el("button", {
        class:"tab",
        role:"tab",
        tabindex: i===0 ? "0" : "-1",
        "aria-selected": i===0 ? "true" : "false",
        "data-dim": dim,
        "data-section": sectionId
      }, [document.createTextNode(dim)]);
      dimTabs.append(btn);
    });

    // Default render placeholder
    content.append(el("div", { class:"empty" }, [
      document.createTextNode("Load data to see this breakdown.")
    ]));

    return section;
  };

  const setTabSelected = (tablistEl, selectedBtn) => {
    const tabs = tablistEl.querySelectorAll('[role="tab"]');
    tabs.forEach(t => {
      const isSel = t === selectedBtn;
      t.setAttribute("aria-selected", isSel ? "true" : "false");
      t.setAttribute("tabindex", isSel ? "0" : "-1");
    });
  };

  const makeViewShell = () => {
    const viewTabs = el("div", { class:"view-tabs", role:"tablist", "aria-label":"View selector" });
    const tableBtn = el("button", { class:"mini", role:"tab", "aria-selected":"true", tabindex:"0", "data-view":"table" }, [document.createTextNode("Table")]);
    const chartBtn = el("button", { class:"mini", role:"tab", "aria-selected":"false", tabindex:"-1", "data-view":"chart" }, [document.createTextNode("Chart")]);
    viewTabs.append(tableBtn, chartBtn);

    const tableWrap = el("div", { class:"table-wrap", "data-pane":"table" });
    const chartPane = el("div", { "data-pane":"chart", style:"display:none" }, [
      el("div", { class:"row" }, [
        el("div", { class:"left" }, [
          el("span", { class:"badge" }, [document.createTextNode("Bar: Top groups (100% stacked)")]),
          el("span", { class:"badge", style:"background: rgba(124,58,237,.10); border-color: rgba(124,58,237,.18)" }, [document.createTextNode("Donuts: One per displayed group")])
        ])
      ]),
      el("div", { class:"chart-card", style:"margin-bottom: 12px;" }, [
        el("div", { style:"height: 360px; margin-bottom: 10px;" }, [
          el("canvas", { id:"__barCanvas" })
        ]),
        el("div", { class:"donut-legend", id:"__barLegend" })
      ]),
      el("div", { class:"donut-grid", id:"__donutGrid" })
    ]);

    const shell = el("div", {}, [
      el("div", { class:"split" }, [
        viewTabs,
        el("div", { class:"hint" }, [document.createTextNode("")])
      ]),
      tableWrap,
      chartPane
    ]);

    return { shell, viewTabs, tableWrap, chartPane, tableBtn, chartBtn };
  };

  const wireViewTabs = (viewTabs, tableWrap, chartPane) => {
    const tabs = viewTabs.querySelectorAll('[role="tab"]');
    viewTabs.addEventListener("click", (e) => {
      const btn = e.target.closest('[role="tab"]');
      if (!btn) return;
      tabs.forEach(t => {
        const isSel = t === btn;
        t.setAttribute("aria-selected", isSel ? "true" : "false");
        t.setAttribute("tabindex", isSel ? "0" : "-1");
      });
      const view = btn.getAttribute("data-view");
      if (view === "table"){
        tableWrap.style.display = "";
        chartPane.style.display = "none";
      } else {
        tableWrap.style.display = "none";
        chartPane.style.display = "";
      }
    });
  };

  const safeId = (s) => s.replace(/[^a-z0-9]+/gi, "_").toLowerCase();

  const destroyChartsForPrefix = (prefix) => {
    Array.from(charts.keys()).forEach((key) => {
      if (key.startsWith(prefix)) {
        destroyChart(key);
      }
    });
  };

  const renderBreakdown = ({ sectionEl, dim, rowsWeek }) => {
    const content = sectionEl.querySelector(".content");
    const grouped = groupBy(rowsWeek, dim);
    const groupedTop = topNPlusOther(grouped, 10);

    const { shell, viewTabs, tableWrap, chartPane } = makeViewShell();
    const chartPrefix = `${sectionEl.id}__${safeId(dim)}__`;
    destroyChartsForPrefix(chartPrefix);
    content.innerHTML = "";
    content.append(shell);

    // Table
    renderTable(tableWrap, groupedTop);

    // Chart wiring
    wireViewTabs(viewTabs, tableWrap, chartPane);

    // Build chart canvases with unique IDs
    const barCanvas = chartPane.querySelector("#__barCanvas");
    const barLegendHost = chartPane.querySelector("#__barLegend");
    const donutGrid = chartPane.querySelector("#__donutGrid");

    const barId = `${chartPrefix}bar`;
    barCanvas.id = barId;

    // Create charts
    destroyChart(barId);
    charts.set(barId, renderStackedBar(barCanvas, groupedTop));
    renderStatusLegend(barLegendHost);

    donutGrid.innerHTML = "";
    groupedTop.forEach((g, idx) => {
      const donutId = `${chartPrefix}donut_${idx}`;
      const legendId = `${chartPrefix}legend_${idx}`;
      const card = el("div", { class:"chart-card" }, [
        el("div", { class:"donut-card-title", title: `${g.group} (${g.denom.toLocaleString()})` }, [
          document.createTextNode(`${g.group} (${g.denom.toLocaleString()})`)
        ]),
        el("div", { class:"donut-canvas-wrap" }, [
          el("canvas", { id: donutId })
        ]),
        el("div", { class:"donut-legend", id: legendId })
      ]);
      donutGrid.append(card);
      const donutCanvas = card.querySelector("canvas");
      charts.set(donutId, renderDonut(donutCanvas, g));
      const legendHost = card.querySelector(`#${legendId}`);
      renderDonutLegend(legendHost, g);
    });
  };

  const buildSections = (rows) => {
    sectionsHost.innerHTML = "";

    // Detect which columns exist (so the dashboard doesn't break if you tweak headers)
    const cols = rows.length ? Object.keys(rows[0]) : [];
    const has = (c) => cols.includes(c);

    const configs = [
      {
        id: "busunits",
        title: "Business Unit Levels",
        hint: "",
        dimensions: ["BusUnitLvl2","BusUnitLvl3","BusUnitLvl4","BusUnitLvl5"].filter(has)
      },
      {
        id: "lvl_names",
        title: "Lvl Names",
        hint: "",
        dimensions: ["Lvl2_Name", has("Lvl3 Name") ? "Lvl3 Name" : "Lvl3_Name"].filter(Boolean).filter(has)
      },
      {
        id: "job",
        title: "Job",
        hint: "",
        dimensions: ["JobLevelGroup","JobFamily"].filter(has)
      },
      {
        id: "site",
        title: "Site",
        hint: "",
        dimensions: ["SiteName"].filter(has)
      }
    ].filter(cfg => cfg.dimensions.length);

    for (const cfg of configs) {
      sectionsHost.append(makeSection(cfg));
    }
  };

  const renderAll = (rows) => {
    const weeks = uniqueSortedWeeks(rows);
    weekSelect.innerHTML = "";
    weeks.forEach((w, i) => {
      const opt = document.createElement("option");
      opt.value = w;
      opt.textContent = w;
      if (i===0) opt.selected = true;
      weekSelect.append(opt);
    });

    const renderWeek = () => {
      const week = weekSelect.value || weeks[0];
      const rowsWeek = rows.filter(r => r.WeekStartDate === week);

      renderKPIs(rowsWeek);

      // For each section, render using currently selected dim tab
      document.querySelectorAll(".section").forEach(sectionEl => {
        const activeDimBtn = sectionEl.querySelector('.tabs [role="tab"][aria-selected="true"]') || sectionEl.querySelector('.tabs [role="tab"]');
        if (!activeDimBtn) return;
        const dim = activeDimBtn.getAttribute("data-dim");
        if (!dim) return;
        renderBreakdown({ sectionEl, dim, rowsWeek });
      });
    };

    weekSelect.addEventListener("change", () => {
      renderWeek();
      if (Array.isArray(window.__ONSITE_ROWS) && window.__ONSITE_ROWS.length) {
        saveToStorage(window.__ONSITE_ROWS, loadStorageMeta());
      }
    });
    renderWeek();
  };

  const saveToStorage = (rows, meta={}) => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
      localStorage.setItem(STORAGE_META, JSON.stringify({
        ...meta,
        selectedWeek: weekSelect?.value || meta.selectedWeek || "",
        savedAt: new Date().toISOString()
      }));
    } catch (e) {
      console.warn("Failed to save dashboard data", e);
    }
  };

  const loadFromStorage = () => {
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    }catch(e){
      console.warn("Failed to parse stored data", e);
      return null;
    }
  };

  const loadStorageMeta = () => {
    try {
      const raw = localStorage.getItem(STORAGE_META);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.warn("Failed to parse dashboard state", e);
      return {};
    }
  };

  const loadXlsxFile = async (file) => {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array", cellDates: true });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet, { defval: 0 });
    return normalizeRows(json);
  };

  const tryAutoLoadLocalXlsx = async () => {
    // Works when served over http(s). Won't work when opened as file:// in many browsers.
    try{
      const resp = await fetch("onsite_data.xlsx", { cache: "no-store" });
      if (!resp.ok) return null;
      const buf = await resp.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array", cellDates: true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: 0 });
      return normalizeRows(json);
    }catch(e){
      return null;
    }
  };


  const downloadTextFile = (filename, content, mimeType="text/html;charset=utf-8") => {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  };

  const buildShareableHtml = () => {
    const rows = Array.isArray(window.__ONSITE_ROWS) ? window.__ONSITE_ROWS : [];
    if (!rows.length) {
      alert("Load data first, then download the shareable copy.");
      return null;
    }
    const selectedWeek = weekSelect.value || "";
    const payload = JSON.stringify(rows).replace(/<\/script/gi, "<\\/script");
    const selectedWeekEscaped = JSON.stringify(selectedWeek);
    const bootstrap = `<script>window.__SHAREABLE_ONSITE_DATA = ${payload}; window.__SHAREABLE_SELECTED_WEEK = ${selectedWeekEscaped}; window.__HIDE_SHARE_CONTROLS = true;<\/script>`;

    let html = document.documentElement.outerHTML;
    html = '<!doctype html>\n' + html;
    html = html.replace('<script>\n(() => {', `${bootstrap}\n<script>\n(() => {`);
    return html;
  };

  // --------- Event wiring ----------
  document.addEventListener("click", (e) => {
    const dimTab = e.target.closest('.tab[role="tab"]');
    if (dimTab) {
      const sectionId = dimTab.getAttribute("data-section");
      const sectionEl = document.getElementById(sectionId);
      if (!sectionEl) return;

      const tablist = dimTab.parentElement;
      setTabSelected(tablist, dimTab);

      const rows = window.__ONSITE_ROWS || [];
      const week = weekSelect.value;
      const rowsWeek = rows.filter(r => r.WeekStartDate === week);
      const dim = dimTab.getAttribute("data-dim");
      renderBreakdown({ sectionEl, dim, rowsWeek });
      return;
    }

    const download = e.target.closest("#downloadShareBtn");
    if (download) {
      const html = buildShareableHtml();
      if (html) downloadTextFile("onsite_status_shareable.html", html);
      return;
    }

    const reset = e.target.closest("#resetBtn");
    if (reset) {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_META);
      location.reload();
    }
  });

  fileInput.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const rows = await loadXlsxFile(file);
    window.__ONSITE_ROWS = rows;
    buildSections(rows);
    renderAll(rows);
    saveToStorage(rows, { source: "upload", filename: file.name, selectedWeek: weekSelect?.value || "" });
  });


  window.addEventListener("beforeunload", () => {
    if (Array.isArray(window.__ONSITE_ROWS) && window.__ONSITE_ROWS.length) {
      saveToStorage(window.__ONSITE_ROWS, loadStorageMeta());
    }
  });

  // --------- Boot ----------
  const boot = async () => {
    if (window.__HIDE_SHARE_CONTROLS) {
      document.getElementById("downloadShareBtn")?.remove();
      document.getElementById("resetBtn")?.remove();
      document.getElementById("fileInput")?.closest(".pill")?.remove();
    }

    // 1) embedded shareable data
    const shared = Array.isArray(window.__SHAREABLE_ONSITE_DATA) ? normalizeRows(window.__SHAREABLE_ONSITE_DATA) : null;
    if (shared && shared.length) {
      window.__ONSITE_ROWS = shared;
      buildSections(shared);
      renderAll(shared);
      if (window.__SHAREABLE_SELECTED_WEEK && Array.from(weekSelect.options).some(o => o.value === window.__SHAREABLE_SELECTED_WEEK)) {
        weekSelect.value = window.__SHAREABLE_SELECTED_WEEK;
        weekSelect.dispatchEvent(new Event("change"));
      }
      return;
    }

    // 2) storage
    const stored = loadFromStorage();
    if (stored && stored.length) {
      const rows = normalizeRows(stored);
      const meta = loadStorageMeta();
      window.__ONSITE_ROWS = rows;
      buildSections(rows);
      renderAll(rows);
      if (meta.selectedWeek && Array.from(weekSelect.options).some(o => o.value === meta.selectedWeek)) {
        weekSelect.value = meta.selectedWeek;
        weekSelect.dispatchEvent(new Event("change"));
      }
      return;
    }

    // 3) try auto-load onsite_data.xlsx from same folder (http server)
    const auto = await tryAutoLoadLocalXlsx();
    if (auto && auto.length) {
      window.__ONSITE_ROWS = auto;
      buildSections(auto);
      renderAll(auto);
      saveToStorage(auto, { source: "auto", filename: "onsite_data.xlsx", selectedWeek: weekSelect?.value || "" });
      return;
    }

    // 4) empty state
    kpiGrid.innerHTML = "";
    sectionsHost.innerHTML = "";
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = `
      <strong>No data loaded yet.</strong><br><br>
      Upload an <code>.xlsx</code> file using the <em>Data</em> control (top right).
      <br><br>
      If you’re using the provided sample file, keep <code>onsite_status_dashboard.html</code> and <code>onsite_data.xlsx</code> in the same folder, then run:
      <br><br>
      <code>python -m http.server</code>
      <br><br>
      …and open the page at <code>http://localhost:8000/onsite_status_dashboard.html</code>.
    `;
    sectionsHost.append(empty);
  };

  boot();
})();
</script>
</body>
</html>
